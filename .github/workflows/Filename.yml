# Action Name:
name: Snake Game

# Time controller for updating the files.
on:
  schedule:
      # It will be updated every 5 hours.
    - cron: "0 */5 * * *"

# Allows execution from the Actions tab (used for build testing).
  workflow_dispatch:

# Rules
jobs:
  build:
    runs-on: ubuntu-latest
    steps:

    # Checks out the repository under $GITHUB_WORKSPACE so the job can access it.
      - uses: actions/checkout@v2

    # Repository that will be used to generate the files.
      - uses: Platane/snk@master
        id: snake-gif
        with:
          github_user_name: IamKirat #Your username
          gif_out_path: dist/github-contribution-grid-snake.gif
          svg_out_path: dist/github-contribution-grid-snake.svg

      - run: git status

      # For updates.
      - name: Push changes
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: master
          force: true

      - uses: crazy-max/ghaction-github-pages@v2.1.3
        with:
          # The output branch mentioned above.
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
